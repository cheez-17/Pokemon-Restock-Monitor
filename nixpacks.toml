[phases.setup]
nixPkgs = ["python312", "chromium", "nss", "nspr", "atk", "cups", "libdrm", "dbus", "libxkbcommon", "pango", "cairo", "alsa-lib", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "mesa"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium"
]

[start]
cmd = "python pokemon_restock_monitor.py"
